openapi: 3.0.3
info:
  title: Image Compress API
  version: 0.2.0
  description: |
    Image compression API designed for VPS deployment.

    Notes:
    - Successful compression requests return JSON metadata plus a one-time `download.url`.
    - Temporary outputs are stored only for a short TTL or until the first successful download.
    - Download URLs are signed with a single-use token and do not require a bearer token.
    - Original Unicode file names are preserved whenever possible; only path separators, control chars, and reserved invalid file-name chars are normalized.
    - The service keeps output format aligned with the detected input format (JPEG/PNG/WebP).
    - Input format is detected from file bytes, not from extension nor multipart content-type.
    - Compression settings are fixed server-side; request-time tuning is not supported.
    - If re-encoding is not smaller, the service falls back to original bytes unless keeping rotated output is required to normalize EXIF Orientation.
servers:
  - url: http://localhost:3001

tags:
  - name: health
  - name: compress
  - name: results

paths:
  /healthz:
    get:
      tags:
        - health
      summary: Health check
      operationId: healthz
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required:
                  - status

  /api/image-compress/healthz:
    get:
      tags:
        - health
      summary: Health check (prefixed)
      operationId: imageCompressHealthz
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required:
                  - status

  /api/image-compress/v1/compress:
    post:
      tags:
        - compress
      summary: Compress uploaded images and create a temporary result resource
      operationId: compressImages
      description: |
        This endpoint accepts one or more uploaded images, compresses them, stores the final artifact temporarily,
        and returns JSON metadata plus a one-time `download.url`.

        HTTP 200 means the request was processed successfully. It does not guarantee that the resulting bytes are smaller.
        Inspect `compressed`, `outcome`, `outputBytes`, `savedBytes`, and `compressionRatio` for business semantics.

        The legacy `responseMode` flow is removed. Clients must use this JSON-first flow and then `GET download.url`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  description: One or more images to compress.
                  type: array
                  items:
                    type: string
                    format: binary
                zipName:
                  description: Optional filename for ZIP output when multiple files are uploaded.
                  type: string
                  example: my_batch
              required:
                - files
      responses:
        '200':
          description: Compression metadata and one-time download reference.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompressMetadataResponse'
        '400':
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
        '413':
          description: Payload too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
        '415':
          description: Unsupported media type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
        '422':
          description: Processing failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
        '500':
          description: Internal error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'
        '507':
          description: Temporary result storage is full.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'

  /api/image-compress/v1/results/{resultId}:
    get:
      tags:
        - results
      summary: Download a temporary result artifact
      operationId: downloadResult
      description: |
        Downloads the artifact created by a previous compression request.

        The `token` query parameter is required. The URL is single-use and may expire before download.
        If the result is missing, expired, already consumed, or the token is invalid, the endpoint returns `404 NOT_FOUND`.
      parameters:
        - in: path
          name: resultId
          required: true
          schema:
            type: string
          description: Temporary result resource identifier.
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: One-time signed download token returned by `POST /v1/compress`.
      responses:
        '200':
          description: Binary artifact for the previously created result.
          headers:
            Content-Disposition:
              schema:
                type: string
              description: Attachment filename for the output, with ASCII `filename` fallback plus UTF-8 `filename*`.
            Content-Length:
              schema:
                type: string
              description: Artifact size in bytes.
            Cache-Control:
              schema:
                type: string
              description: Cache policy for the temporary result.
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            application/zip:
              schema:
                type: string
                format: binary
        '404':
          description: Result not found, expired, already consumed, or token invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorPayload'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: Use one token from the server-side IMAGE_COMPRESS_API_TOKENS list.
  schemas:
    ApiErrorCode:
      type: string
      enum:
        - INVALID_ARGUMENT
        - UNAUTHORIZED
        - PAYLOAD_TOO_LARGE
        - UNSUPPORTED_MEDIA_TYPE
        - PROCESSING_FAILED
        - NOT_FOUND
        - INSUFFICIENT_STORAGE
        - INTERNAL_ERROR
    ApiErrorPayload:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              $ref: '#/components/schemas/ApiErrorCode'
            message:
              type: string
          required:
            - code
            - message
      required:
        - error
    CompressOutcome:
      type: string
      enum:
        - compressed
        - fallback_original
      description: |
        Business outcome for a successful compression request.
        `fallback_original` means the response kept original bytes for every file.
    CompressReason:
      type: string
      enum:
        - reencoded_not_smaller
    CompressOutputType:
      type: string
      enum:
        - single
        - zip
    DownloadReference:
      type: object
      properties:
        url:
          type: string
          format: uri
          example: http://localhost:3001/api/image-compress/v1/results/9f3a7d4e-1234-5678-9abc-def012345678?token=example_token
        expiresAt:
          type: string
          format: date-time
        singleUse:
          type: boolean
          example: true
      required:
        - url
        - expiresAt
        - singleUse
    CompressMetadataFileResult:
      type: object
      properties:
        originalFileName:
          type: string
          description: Original uploaded file name after minimal safety normalization.
        outputFileName:
          type: string
          description: Final output file name, preserving original Unicode characters when possible.
        outputMimeType:
          type: string
          example: image/jpeg
        compressed:
          type: boolean
        outcome:
          $ref: '#/components/schemas/CompressOutcome'
        reason:
          $ref: '#/components/schemas/CompressReason'
        originalBytes:
          type: integer
          format: int64
        outputBytes:
          type: integer
          format: int64
        savedBytes:
          type: integer
          format: int64
        compressionRatio:
          type: number
          format: double
      required:
        - originalFileName
        - outputFileName
        - outputMimeType
        - compressed
        - outcome
        - originalBytes
        - outputBytes
        - savedBytes
        - compressionRatio
    CompressMetadataResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        compressed:
          type: boolean
        outcome:
          $ref: '#/components/schemas/CompressOutcome'
        reason:
          $ref: '#/components/schemas/CompressReason'
        originalBytes:
          type: integer
          format: int64
        outputBytes:
          type: integer
          format: int64
        savedBytes:
          type: integer
          format: int64
        compressionRatio:
          type: number
          format: double
        outputType:
          $ref: '#/components/schemas/CompressOutputType'
        outputMimeType:
          type: string
          example: image/jpeg
        outputFileName:
          type: string
          description: Final response file name, preserving original Unicode characters when possible.
        fileCount:
          type: integer
          format: int32
        download:
          $ref: '#/components/schemas/DownloadReference'
        results:
          type: array
          items:
            $ref: '#/components/schemas/CompressMetadataFileResult'
      required:
        - success
        - compressed
        - outcome
        - originalBytes
        - outputBytes
        - savedBytes
        - compressionRatio
        - outputType
        - outputMimeType
        - outputFileName
        - fileCount
        - download
        - results
